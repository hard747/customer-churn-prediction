services:
  postgres:
    image: postgres:16-alpine
    container_name: churn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-churn}
      POSTGRES_USER: ${POSTGRES_USER:-churn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-churn_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - churn_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-churn_user} -d ${POSTGRES_DB:-churn}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  churn_postgres_data:
