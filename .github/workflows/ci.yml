name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/ tests/ warehouse_demo/src/

      - name: Tests (pytest)
        run: pytest tests/ -v

  test-neon:
    name: Testar contra Postgres real (Neon)
    runs-on: ubuntu-latest
    # So roda em push a main deste repositorio -- forks nao tem acesso
    # ao secret, entao NEON_DATABASE_URL fica vazia e get_engine()
    # (src/db.py) cai automaticamente para SQLite, sem quebrar nada.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Popular tabela customers no Neon
        run: python src/build_database.py

      - name: Rodar consultas SQL contra o Neon
        run: python src/run_sql_analysis.py

      - name: Rodar suite de testes contra o Neon real
        run: pytest tests/ -v

  test-neon-warehouse:
    name: Testar warehouse_demo/ contra Postgres real (Neon)
    runs-on: ubuntu-latest
    # Mesmo escopo que o job test-neon (so push a main) e mesma logica
    # de fallback -- ver comentario acima e ADR-0009.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Instalar dependencias (warehouse_demo: dbt + Prefect)"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-warehouse.txt

      - name: Derivar variaveis PG* a partir de NEON_DATABASE_URL (dbt precisa delas separadas, nao como URL unica)
        run: |
          python -c "
          import os
          from urllib.parse import urlparse, unquote

          raw_url = os.environ.get('DATABASE_URL', '')
          if not raw_url:
              # Sem o secret configurado (ex.: fork de outra pessoa) -- pula
              # silenciosamente, o proximo passo tambem vai pular.
              exit(0)

          url = raw_url.replace('postgresql+psycopg2://', 'postgresql://')
          parsed = urlparse(url)
          password = unquote(parsed.password or '')

          print(f'::add-mask::{password}')

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'PGHOST={parsed.hostname}\n')
              f.write(f'PGPORT={parsed.port or 5432}\n')
              f.write(f'PGUSER={parsed.username}\n')
              f.write(f'PGPASSWORD={password}\n')
              f.write(f'PGDATABASE={parsed.path.lstrip(chr(47))}\n')
              f.write('PGSSLMODE=require\n')
          "

      - name: Rodar flow completo (extracao + dbt run + dbt test + treino + scoring) contra o Neon
        if: env.DATABASE_URL != ''
        run: python warehouse_demo/src/flow.py
